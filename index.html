<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave & Kim's Wedding RSVP</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Georgia', serif;
background: url('Wedding BG.png') center center fixed;
background-size: cover;
min-height: 100vh;
padding: 40px 20px;
}
.container {
max-width: 600px;
margin: 0 auto;
background: white;
border-radius: 20px;
padding: 50px;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
h1 {
font-size: 2.5em;
color: #667eea;
text-align: center;
margin-bottom: 10px;
}
.subtitle {
text-align: center;
color: #666;
font-size: 1.2em;
margin-bottom: 40px;
}
.section {
margin-bottom: 30px;
}
label {
display: block;
font-weight: bold;
margin-bottom: 8px;
color: #333;
}
input[type="text"],
input[type="email"],
select,
textarea {
width: 100%;
padding: 12px;
border: 2px solid #ddd;
border-radius: 8px;
font-size: 16px;
margin-bottom: 15px;
transition: border-color 0.3s;
}
input:focus,
select:focus,
textarea:focus {
outline: none;
border-color: #667eea;
}
.radio-group {
display: flex;
gap: 20px;
margin-bottom: 15px;
}
.radio-group label {
font-weight: normal;
display: flex;
align-items: center;
gap: 8px;
cursor: pointer;
}
button {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
border: none;
padding: 15px 40px;
font-size: 18px;
border-radius: 10px;
cursor: pointer;
width: 100%;
margin-top: 20px;
transition: transform 0.2s;
}
button:hover {
transform: translateY(-2px);
}
.note {
font-size: 14px;
color: #888;
margin-top: 10px;
font-style: italic;
}
.required {
color: #e74c3c;
}
</style>
</head>
<body>
<div class="container">
<h1>🎉 Dave & Kim's Wedding 🎉</h1>
<p class="subtitle">Please RSVP by May 15, 2026</p>
<form action="https://formsubmit.co/daveandkimberly2026@agentmail.to" method="POST">
<!-- FormSubmit configuration -->
<input type="hidden" name="_subject" value="Wedding RSVP Response">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://ezpeasydave.github.io/dave-kimberly-wedding-rsvp/thanks.html">
<input type="hidden" name="_template" value="table">

<!-- Name Fields -->
<div class="section">
<label for="guest_name">Your Full Name <span class="required">*</span></label>
<input type="text" id="guest_name" name="guest_name" required>
<label for="email" style="margin-top: 20px;">Email Address <span class="required">*</span></label>
<input type="email" id="email" name="email" required>
</div>
<!-- Attendance -->
<div class="section">
<label>Will you attend?</label>
<div class="radio-group">
<label>
<input type="radio" name="attendance" value="attending" required>
Joyfully accept
</label>
<label>
<input type="radio" name="attendance" value="regretfully">
Regretfully decline
</label>
</div>
</div>
<!-- Number of Guests -->
<div class="section">
<label for="num_guests">Number of guests attending</label>
<select id="num_guests" name="num_guests">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>
<p class="note">Including yourself</p>
</div>
<!-- Song Requests -->
<div class="section">
<label for="song_request">Song request (optional, no promises!)</label>
<input type="text" id="song_request" name="song_request" placeholder="What song would you love to hear?">
</div>
<!-- Message -->
<div class="section">
<label for="message">A message for Dave & Kim (optional)</label>
<textarea id="message" name="message" rows="4" placeholder="Congratulations, well wishes, etc."></textarea>
</div>
<button type="submit">Send RSVP ✨</button>
</form>
</div>
</body>
</html>
